<!DOCTYPE html>
<html>

<head>
    <title>DEBUG - Products Page Test</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 256px;
            background: #1e293b;
            color: white;
            padding: 24px;
        }

        .main {
            flex: 1;
            background: white;
            padding: 24px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 24px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <h2>LA ROCCA</h2>
            <p>Admin Panel</p>
        </div>
        <div class="main">
            <div class="header">Products (Retail) - TEST PAGE</div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Test Product 1</td>
                        <td>Coffee</td>
                        <td>$10.00</td>
                    </tr>
                    <tr>
                        <td>Test Product 2</td>
                        <td>Oil</td>
                        <td>$15.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
